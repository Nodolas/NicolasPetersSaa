<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#030508"/>

  <!-- N letterform strokes -->
  <line x1="7" y1="7"  x2="7"  y2="25" stroke="#edf5ff" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="7" y1="7"  x2="25" y2="25" stroke="#edf5ff" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="25" y1="7" x2="25" y2="25" stroke="#edf5ff" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Node dots at corners -->
  <circle cx="7"  cy="7"  r="2.8" fill="#00d4ff"/>
  <circle cx="7"  cy="25" r="2.8" fill="#00d4ff"/>
  <circle cx="25" cy="7"  r="2.8" fill="#00d4ff"/>
  <circle cx="25" cy="25" r="2.8" fill="#00d4ff"/>

  <!-- Mid-diagonal node (nod to the network/constellation look) -->
  <circle cx="16" cy="16" r="1.8" fill="#00d4ff" opacity="0.65"/>
</svg>
